<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#646cff"/>
      <stop offset="100%" style="stop-color:#42b883"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- C++ 文字 -->
  <text x="100" y="90" font-family="'Courier New', monospace" font-size="38" font-weight="bold"
        fill="white" text-anchor="middle" dominant-baseline="middle">C++</text>
  <!-- Qt 文字 -->
  <text x="100" y="135" font-family="'Courier New', monospace" font-size="32" font-weight="bold"
        fill="rgba(255,255,255,0.9)" text-anchor="middle" dominant-baseline="middle">Qt</text>
  <!-- 底部装饰线 -->
  <line x1="40" y1="155" x2="160" y2="155" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
  <text x="100" y="172" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.7)"
        text-anchor="middle">面试题库</text>
</svg>
